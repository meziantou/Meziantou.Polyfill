name: publish
on:
  push:
    branches:
      - 'main'
  pull_request:

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_NOLOGO: true
  NuGetDirectory: ${{ github.workspace}}/nuget

defaults:
  run:
    shell: pwsh

jobs:
  lint_readme:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
    - name: Setup .NET Core
      uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
    - uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
      with:
        path: ~/.nuget/packages
        key: nuget-${{ hashFiles('**/Meziantou.Polyfill.Generator.csproj', '**/global.json') }}
    - name: Copy README before generation
      run: Copy-Item README.md README.md.before
    - run: dotnet build Meziantou.Polyfill.Generator/Meziantou.Polyfill.Generator.csproj
    - run: dotnet run --no-build --project Meziantou.Polyfill.Generator/Meziantou.Polyfill.Generator.csproj
    - name: Validate README is up to date
      run: |
        # Normalize line endings for comparison
        $before = (Get-Content README.md.before -Raw) -replace '\r\n', "`n"
        $after = (Get-Content README.md -Raw) -replace '\r\n', "`n"
        if ($before -ne $after) {
          Write-Host "ERROR: README.md is not up to date. Please run the generator and commit the changes."
          Write-Host "Diff:"
          git --no-pager diff --no-index README.md.before README.md
          exit 1
        }
        Write-Host "README.md is up to date"

  create_nuget:
    runs-on: ubuntu-latest
    env:
      RepositoryBranch: ${{github.ref}}
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
    - name: Setup .NET Core
      uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
    - uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
      with:
        path: ~/.nuget/packages
        key: nuget-${{ hashFiles('**/Meziantou.Polyfill.Generator.csproj', '**/global.json') }}
    - run: dotnet build Meziantou.Polyfill.Generator/Meziantou.Polyfill.Generator.csproj
    - run: dotnet run --no-build --project Meziantou.Polyfill.Generator/Meziantou.Polyfill.Generator.csproj
    - run: dotnet pack Meziantou.Polyfill --configuration Release

    - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      with:
        name: nuget
        if-no-files-found: error
        retention-days: 3
        path: '**/*.nupkg'

    - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      with:
        name: generated-code
        if-no-files-found: error
        retention-days: 3
        path: '**/*.g.cs'

  validate_nuget:
    runs-on: ubuntu-latest
    needs: [ create_nuget ]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Setup .NET Core (global.json)
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: nuget
          path: ${{ env.NuGetDirectory }}
      - name: Run dotnet validate
        run: |
          dotnet tool update Meziantou.Framework.NuGetPackageValidation.Tool --global
          $files = Get-ChildItem "${{ env.NuGetDirectory }}/*" -Recurse -Include *.nupkg
          $Errors = $false
          foreach($file in $files) {
              & meziantou.validate-nuget-package "$file"
              if ($LASTEXITCODE -ne 0) {
                $Errors = $true
              }
          }
          if ($Errors) {
            exit 1
          }

  source_generator_tests:
    runs-on: windows-latest
    steps:
    - name: git configure long path
      run: git config --global core.longpaths true
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
    - name: Setup .NET
      uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
    - uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
      with:
        path: ~/.nuget/packages
        key: nuget-${{ hashFiles('**/Meziantou.Polyfill.Generator.csproj', '**/global.json') }}
    - run: dotnet build Meziantou.Polyfill.Generator/Meziantou.Polyfill.Generator.csproj
    - run: dotnet run --no-build --project Meziantou.Polyfill.Generator/Meziantou.Polyfill.Generator.csproj
    - run: dotnet test Meziantou.Polyfill.SourceGenerator.Tests

  tests:
    runs-on: windows-latest
    steps:
    - name: git configure long path
      run: git config --global core.longpaths true
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
    - name: Setup .NET
      uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
      with:
        global-json-file: global.json
        dotnet-version: |
            9.0.x
            8.0.x
    - uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
      with:
        path: ~/.nuget/packages
        key: nuget-${{ hashFiles('**/Meziantou.Polyfill.Generator.csproj', '**/global.json') }}
    - run: dotnet build Meziantou.Polyfill.Generator/Meziantou.Polyfill.Generator.csproj
    - run: dotnet run --no-build --project Meziantou.Polyfill.Generator/Meziantou.Polyfill.Generator.csproj
    - run: dotnet test Meziantou.Polyfill.Tests

  deploy:
    runs-on: 'ubuntu-latest'
    needs: [ validate_nuget, source_generator_tests, tests, lint_readme ]
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
      id-token: write
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      with:
        fetch-depth: 2
    - name: Setup .NET Core
      uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
    - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
      with:
        name: nuget
        path: ${{ env.NuGetDirectory }}
    - name: Setup .NET Core
      uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
    - name: NuGet login (OIDC → temp API key)
      uses: NuGet/login@8d196754b4036150537f80ac539e15c2f1028841 # v1
      id: login
      with:
        user: meziantou
    - run: |
        Write-Host "Current ref: $env:GITHUB_REF"
        Write-Host "Searching nupkg in folder: ${{ env.NuGetDirectory }}"
        $files = Get-ChildItem "${{ env.NuGetDirectory }}/*" -Recurse -Include *.nupkg
        foreach($file in $files) {
            Write-Host "Pushing NuGet package: $($file.FullName)"
            if ($env:GITHUB_REF -eq 'refs/heads/main')
            {
              & dotnet nuget push "$($file.FullName)" --api-key "$env:NuGetApiKey" --source https://api.nuget.org/v3/index.json --force-english-output --skip-duplicate
            }
            else
            {
              Write-Host "Not on the default branch => Do not push"
            }
        }
      name: Publish NuGet packages
      if: always()
      env:
        NuGetApiKey: ${{steps.login.outputs.NUGET_API_KEY}}

  final_status_check:
    runs-on: ubuntu-latest
    if: always()
    needs: [ create_nuget, validate_nuget, source_generator_tests, tests, lint_readme, deploy ]
    steps:
      - name: Check previous jobs status
        env:
          NEEDS_JSON: ${{ toJson(needs) }}
        run: |
          $needs = $env:NEEDS_JSON | ConvertFrom-Json -AsHashtable
          $failedJobs = @(
            $needs.GetEnumerator()
            | Where-Object { $_.Value.result -notin @('success', 'skipped') }
          )

          if ($failedJobs.Count -eq 0) {
            Write-Host "All dependency jobs succeeded or were skipped."
            exit 0
          }

          $failedJobNames = $failedJobs.Name | Sort-Object
          Write-Host "::error::Some jobs did not succeed: $($failedJobNames -join ', ')"
          exit 1
